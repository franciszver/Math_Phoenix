# Render Blueprint for Math Phoenix
# This file defines the infrastructure for deploying to Render

services:
  # Backend API Service
  - type: web
    name: math-phoenix-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TEXT_MODEL
        value: openai/gpt-oss-20b:free
      - key: VISION_MODEL
        value: google/gemma-4-31b-it:free
      - key: TEXT_MODEL_FALLBACK
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: VISION_MODEL_FALLBACK
        value: nvidia/nemotron-nano-12b-v2-vl:free
      - key: SESSION_SECRET
        generateValue: true
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: math-phoenix-frontend
          property: host

  # Frontend Static Site
  - type: web
    name: math-phoenix-frontend
    env: static
    region: oregon
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: math-phoenix-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

